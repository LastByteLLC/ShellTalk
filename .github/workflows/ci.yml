name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      matrix:
        swift: ["6.0"]
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.1-jammy
    strategy:
      matrix:
        swift: ["6.1-nightly"]
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Smoke test
        run: |
          swift run shelltalk "find swift files"
          swift run shelltalk --profile

  wasm:
    name: WebAssembly
    runs-on: ubuntu-latest
    container: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v5

      - name: Install Swift SDK for WASM
        run: >-
          swift sdk install
          https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.3-RELEASE/swift-wasm-6.3-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip
          --checksum 6704d137e532f1ac31eafedd80658f9ee61239f2b6291216a02da32361ea9dcb

      - name: Remove embedded SDK variant (no Foundation)
        run: find / -path '*/swift-sdks/*/embedded-swift-sdk.json' -delete 2>/dev/null || true

      - name: Verify SDK installed
        run: swift sdk list

      - name: Build WASM binary
        run: swift build --swift-sdk wasm32-unknown-wasip1 --product shelltalk-wasm -c release -Xswiftc -Osize

      - name: Optimize WASM binary
        run: |
          apt-get update -qq && apt-get install -y -qq binaryen > /dev/null
          wasm-opt -Oz --strip-debug --strip-producers \
            .build/wasm32-unknown-wasip1/release/shelltalk-wasm.wasm \
            -o Web/shelltalk.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: Web

  deploy:
    name: Deploy to GitHub Pages
    needs: [macos, linux, wasm]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
