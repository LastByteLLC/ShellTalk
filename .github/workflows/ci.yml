name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      matrix:
        swift: ["6.0"]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.1-jammy
    strategy:
      matrix:
        swift: ["6.1-nightly"]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Smoke test
        run: |
          swift run shelltalk "find swift files"
          swift run shelltalk --profile
